    <link rel="icon" type="image/png" href="../sm-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
        }

        /* ── START SCREEN ── */
        #startScreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 32px;
        }

        #startScreen h1 {
            font-size: clamp(22px, 5vw, 54px);
            letter-spacing: 0.25em;
            color: #e8453f;
            text-align: center;
            text-transform: uppercase;
            font-weight: 700;
        }

        #startScreen .sub {
            font-size: 11px;
            letter-spacing: 0.3em;
            color: #444;
            text-transform: uppercase;
        }

        #startBtn {
            background: transparent;
            border: 1px solid #e8453f;
            color: #e8453f;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 0.35em;
            padding: 14px 52px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #startBtn:hover {
            background: #e8453f;
            color: #000;
        }

        /* ── SKIP BUTTON ── */
        #skipBtn {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 500;
            background: transparent;
            border: none;
            color: #333;
            font-family: 'Oswald', sans-serif;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            display: none;
            padding: 6px;
        }

        #skipBtn:hover { color: #666; }

        /* ── FILM CONTAINER ── */
        #filmContainer {
            position: fixed;
            inset: 0;
            background: #000;
            display: none;
        }

        /* Photo */
        #photoDisplay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: sepia(0.35) contrast(1.15) brightness(0.92) saturate(0.8);
            display: none;
        }

        /* Text */
        #textDisplay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px;
            z-index: 15;
        }

        .text-zoom {
            font-size: clamp(32px, 7vw, 90px);
            color: #e8453f;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 700;
            animation: zoomIn 8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .text-lift {
            font-size: clamp(16px, 3vw, 36px);
            color: #e8453f;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 500;
            max-width: 680px;
            line-height: 1.6;
            animation: liftIn 2.2s ease forwards;
        }

        .text-card {
            font-size: clamp(18px, 3.5vw, 48px);
            color: #e8453f;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            animation: fadeCard 4.5s ease forwards;
        }

        @keyframes zoomIn {
            from { transform: scale(0.25); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        @keyframes liftIn {
            from { transform: translateY(48px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        @keyframes fadeCard {
            0%   { opacity: 0; }
            18%  { opacity: 1; }
            72%  { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Vignette */
        #vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.78) 100%);
            pointer-events: none;
            z-index: 20;
        }

        /* Grain */
        #grainCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
            opacity: 0.08;
            mix-blend-mode: overlay;
            image-rendering: pixelated;
        }

        /* Scratch */
        #scratch {
            position: absolute;
            top: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.55) 20%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0.4) 80%, transparent);
            pointer-events: none;
            z-index: 40;
            display: none;
        }

        /* Flash */
        #flash {
            position: absolute;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        #flash.pop {
            animation: flashPop 0.14s ease-out forwards;
        }

        @keyframes flashPop {
            0%   { opacity: 0.92; }
            100% { opacity: 0; }
        }

        /* End screen */
        #endScreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            gap: 28px;
        }

        #endScreen a {
            color: #e8453f;
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            letter-spacing: 0.3em;
            text-decoration: none;
            text-transform: uppercase;
            border-bottom: 1px solid #e8453f;
            padding-bottom: 3px;
        }

        #endScreen a:hover { color: #fff; border-color: #fff; }

        #playAgainBtn {
            background: transparent;
            border: 1px solid #e8453f;
            color: #e8453f;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 0.35em;
            padding: 14px 52px;
            cursor: pointer;
            text-transform: uppercase;
        }

        #playAgainBtn:hover {
            background: #e8453f;
            color: #000;
        }

        #pauseIndicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            letter-spacing: 0.4em;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            pointer-events: none;
            z-index: 200;
            display: none;
        }

        #muteBtn {
            position: fixed;
            bottom: 20px;
            right: 24px;
            z-index: 500;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.5);
            font-family: 'Oswald', sans-serif;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 7px 14px;
            display: none;
        }

        #muteBtn:hover { color: #fff; border-color: #fff; }

        #backBtn {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 500;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.35);
            font-family: 'Oswald', sans-serif;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 6px;
            display: none;
            text-decoration: none;
        }

        #backBtn:hover { color: #fff; }

        /* ── TOUCH HINT ── */
        #touchHint {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Oswald', sans-serif;
            font-size: 10px;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            pointer-events: none;
            z-index: 200;
            display: none;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            #startScreen h1 { font-size: clamp(20px, 7vw, 36px); padding: 0 24px; }
            #startBtn { padding: 16px 40px; font-size: 13px; }
            #skipBtn { top: 16px; right: 16px; font-size: 12px; padding: 10px; }
            #muteBtn { bottom: 16px; right: 16px; padding: 12px 20px; font-size: 12px; }
            #backBtn { top: 16px; left: 16px; font-size: 12px; padding: 10px; }
            #pauseIndicator { font-size: 11px; }
            .text-zoom { font-size: clamp(28px, 9vw, 60px); }
            .text-lift { font-size: clamp(13px, 4vw, 24px); padding: 0 20px; }
            .text-card { font-size: clamp(16px, 5vw, 32px); padding: 0 20px; }
        }
    </style>
</head>

        const grainCtx = grainCanvas.getContext('2d');
        let grainTick = 0;
        let grainRunning = false;

        function animateGrain() {
            if (!grainRunning) return;
            grainTick++;
            if (grainTick % 3 === 0) {
                const imageData = grainCtx.createImageData(256, 256);
                const d = imageData.data;
                for (let i = 0; i < d.length; i += 4) {
                    const v = Math.random() * 255 | 0;
                    d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 28;
                }
                grainCtx.putImageData(imageData, 0, 0);
            }
            requestAnimationFrame(animateGrain);
        }

        // ── FLASH ────────────────────────────────────────────────────────────
        function triggerFlash() {
            flash.classList.remove('pop');
            void flash.offsetWidth;
            flash.classList.add('pop');
        }

        // ── SCRATCH ──────────────────────────────────────────────────────────
        function maybeScratch() {
            if (Math.random() > 0.82) {
                scratch.style.left = (Math.random() * 98) + 'vw';
                scratch.style.display = 'block';
                setTimeout(() => { scratch.style.display = 'none'; }, 60 + Math.random() * 100);
            }
        }

        // ── HELPERS ──────────────────────────────────────────────────────────
        function showPhoto(src) {
            textDisplay.innerHTML = '';
            photoDisplay.src = src;
            photoDisplay.style.display = 'block';
        }

        function showText(text, cls) {
            photoDisplay.style.display = 'none';
            photoDisplay.src = '';
            textDisplay.innerHTML = `<span class="${cls}">${text}</span>`;
        }

        function clearAll() {
            photoDisplay.style.display = 'none';
            photoDisplay.src = '';
            textDisplay.innerHTML = '';
        }

        // ── ACTS ─────────────────────────────────────────────────────────────
        async function act1() {
            if (!act1Images.length) return;
            const reversed = [...act1Images].reverse();
            for (let i = 0; i < reversed.length; i++) {
                showPhoto(reversed[i]);
                maybeScratch();
                if ((i + 1) % 12 === 0) triggerFlash();
                await wait(80);
            }
            clearAll();
            await wait(400);
        }

        async function act2() {
            await wait(1200);
            showText('THE BEGINNING', 'text-zoom');
            await wait(6500);
            clearAll();
            await wait(300);
            if (!act2Images.length) return;
            const beforeCurrent = act2Images.slice(0, act2Images.length - 1);
            const current = act2Images[act2Images.length - 1];
            for (let i = 0; i < beforeCurrent.length; i++) {
                triggerFlash();
                await wait(120);
                showPhoto(beforeCurrent[i]);
                maybeScratch();
                await wait(3500);
            }
            clearAll();
            await wait(300);
            showText('NOW', 'text-zoom');
            await wait(6500);
            clearAll();
            await wait(300);
            triggerFlash();
            await wait(120);
            showPhoto(current);
            maybeScratch();
            await wait(3500);
            clearAll();
            await wait(400);
        }

        async function act3() {
            showText('none of this would be possible without you', 'text-lift');
            await wait(3200);
            clearAll();
            await wait(300);
            for (let i = 0; i < act3Images.length; i++) {
                showPhoto(act3Images[i]);
                maybeScratch();
                if ((i + 1) % 5 === 0) triggerFlash();
                await wait(600);
            }
            clearAll();
            await wait(600);
        }

        async function act4() {
            const cards = [
                'thank you.',
                'you stood in the pit. you took the hit.',
                'we carry you with us.'
            ];
            photoDisplay.src = '../images/act4/bandphoto.webp';
            photoDisplay.style.filter = 'sepia(0.15) contrast(1.05) brightness(0.97) saturate(0.92)';
            photoDisplay.style.display = 'block';
            for (const text of cards) {
                textDisplay.innerHTML = `<span class="text-card">${text}</span>`;
                await wait(4500);
                textDisplay.innerHTML = '';
                await wait(600);
            }
            photoDisplay.style.filter = '';
            clearAll();
        }

        // ── MAIN ─────────────────────────────────────────────────────────────
        let skipped = false;
        let paused = false;
        let pauseResolve = null;
        const pauseIndicator = document.getElementById('pauseIndicator');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const muteBtn = document.getElementById('muteBtn');
        const backBtn = document.getElementById('backBtn');
        const bgAudio = document.getElementById('bgAudio');
        const touchHint = document.getElementById('touchHint');
        const isTouchDevice = () => window.matchMedia('(hover: none)').matches;

        // ── AUDIO ────────────────────────────────────────────────────────────
        muteBtn.addEventListener('click', () => {
            bgAudio.muted = !bgAudio.muted;
            muteBtn.textContent = bgAudio.muted ? 'Unmute' : 'Mute';
        });

        function fadeOutAudio(duration) {
            if (bgAudio.paused) return;
            const step = bgAudio.volume / (duration / 100);
            const fade = setInterval(() => {
                if (bgAudio.volume > step) {
                    bgAudio.volume = Math.max(0, bgAudio.volume - step);
                } else {
                    bgAudio.volume = 0;
                    bgAudio.pause();
                    clearInterval(fade);
                }
            }, 100);
        }

        bgAudio.addEventListener('timeupdate', () => {
            if (!bgAudio.duration) return;
            const remaining = bgAudio.duration - bgAudio.currentTime;
            if (remaining <= 4 && bgAudio.volume > 0) {
                fadeOutAudio(remaining * 1000);
            }
        });

        function wait(ms) {
            return new Promise(resolve => {
                const start = Date.now();
                function tick() {
                    if (skipped) { resolve(); return; }
                    if (paused) { pauseResolve = resolve; return; }
                    const elapsed = Date.now() - start;
                    if (elapsed >= ms) { resolve(); }
                    else { setTimeout(tick, Math.min(16, ms - elapsed)); }
                }
                tick();
            });
        }

        function togglePause() {
            paused = !paused;
            pauseIndicator.style.display = paused ? 'block' : 'none';
            backBtn.style.display = paused ? 'block' : 'none';
            if (isTouchDevice()) touchHint.style.display = paused ? 'none' : 'block';
            if (paused) {
                bgAudio.pause();
            } else {
                bgAudio.play().catch(() => {});
                if (pauseResolve) {
                    const res = pauseResolve;
                    pauseResolve = null;
                    res();
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code !== 'Space') return;
            if (filmContainer.style.display !== 'block') return;
            e.preventDefault();
            togglePause();
        });

        filmContainer.addEventListener('touchend', (e) => {
            if (filmContainer.style.display !== 'block') return;
            if (e.target.closest('button, a')) return;
            e.preventDefault();
            togglePause();
        }, { passive: false });

        filmContainer.addEventListener('click', (e) => {
            if (filmContainer.style.display !== 'block') return;
            if (e.target.closest('button, a')) return;
            togglePause();
        });

        skipBtn.addEventListener('click', () => {
            skipped = true;
            paused = false;
            grainRunning = false;
            bgAudio.pause();
            bgAudio.currentTime = 0;
            filmContainer.style.display = 'none';
            skipBtn.style.display = 'none';
            muteBtn.style.display = 'none';
            backBtn.style.display = 'none';
            pauseIndicator.style.display = 'none';
            touchHint.style.display = 'none';
            endScreen.style.display = 'flex';
        });

        function preloadImages(images) {
            return Promise.all(images.map(src => new Promise(resolve => {
                const img = new Image();
                img.onload = img.onerror = resolve;
                img.src = src;
            })));
        }

        async function runFilm() {
            skipped = false;
            paused = false;
            endScreen.style.display = 'none';

            // Show loading on start screen while preloading act1
            startBtn.textContent = 'Loading...';
            startBtn.disabled = true;
            await preloadImages([...act1Images, '../images/act4/_84A3898.webp']);
            startBtn.textContent = 'Play';
            startBtn.disabled = false;

            startScreen.style.display = 'none';
            filmContainer.style.display = 'block';
            skipBtn.style.display = 'block';
            muteBtn.style.display = 'block';
            backBtn.style.display = 'none';
            touchHint.style.display = isTouchDevice() ? 'block' : 'none';
            grainRunning = true;
            animateGrain();
            bgAudio.volume = 1;
            bgAudio.currentTime = 0;
            bgAudio.play().catch(() => {});

            await act1();
            if (skipped) return;
            await act2();
            if (skipped) return;
            await act3();
            if (skipped) return;
            await act4();

            if (!skipped) {
                grainRunning = false;
                bgAudio.pause();
                bgAudio.currentTime = 0;
                filmContainer.style.display = 'none';
                skipBtn.style.display = 'none';
                muteBtn.style.display = 'none';
                backBtn.style.display = 'none';
                touchHint.style.display = 'none';
                endScreen.style.display = 'flex';
            }
        }

        startBtn.addEventListener('click', runFilm);
        playAgainBtn.addEventListener('click', runFilm);
    </script>
</body>

</html>
