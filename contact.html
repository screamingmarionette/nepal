<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screaming Marionette</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <section class="hero">
        <div class="hero-bg hero-bg1"></div>
        <div class="hero-bg hero-bg2"></div>

        <header class="topbar" id="topbar">
            <div class="nav-wrap">
                <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <nav>
                    <ul class="nav" id="navList">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="music.html">Music</a></li>
                        <li><a href="tour.html">Tour</a></li>
                        <li><a href="gallery.html">Gallery</a></li>
                        <li><a href="contact.html" class="active">Contact</a></li>
                    </ul>
                </nav>
            </div>

            <div class="socials" id="socials">
                <a href="https://www.facebook.com/screamingmarionette1" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a href="https://instagram.com/screamingmarionette" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://www.tiktok.com/@screaming.marionette" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
            </div>
        </header>

        <div class="hero-inner contact-hero-inner">
            <div class="contact-wrapper">

                <div class="contact-card form-card">
                    <h1 class="contact-heading">Message to Band</h1>

                    <form id="contactForm" class="contact-form" action="https://formspree.io/f/xnjgjvgj" method="POST">

                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Your name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Your email" required>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="6" placeholder="Write your message" required></textarea>
                        </div>

                        <input type="hidden" name="_subject" value="New message from Screaming Marionette website">

                        <button type="submit" class="btn1">Send Message</button>

                    </form>

                    <p id="formStatus" style="margin-top:10px;"></p>
                </div>

                <div class="contact-card booking-card">
                <h2 class="contact-heading">Booking</h2>
                <p class="booking-text">
                    For live shows, festivals, collaborations, press, and official band inquiries.
                </p>

                <div class="booking-email">
                    <a href="mailto:screamingmarionette2016@gmail.com">screamingmarionette2016@gmail.com</a>
                </div>
                </div>

            </div>
        </div>
    </section>

<script src="js/script.js"></script>
</body>
</html>
